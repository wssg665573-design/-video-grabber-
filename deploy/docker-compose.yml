services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: videograb:latest
    container_name: videograb
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../data:/app/data

  # 可选：Nginx 反向代理（生产推荐）
  nginx:
    image: nginx:1.27-alpine
    container_name: videograb-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
